name: 記事自動執筆

# ============================================================
# トリガー設定
# - 10分ごとに自動実行してWritingカラムのカードを処理する
# - 手動実行も可能（即時テスト用）
# ============================================================
on:
  schedule:
    - cron: "*/10 * * * *"  # 10分ごとに実行

  workflow_dispatch:  # 手動実行ボタン

permissions:
  contents: write
  issues: write

jobs:
  write-article:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Writing カラムのカードを処理
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python src/main.py

      - name: データベースの変更をコミット
        run: |
          git config --global user.name "nanigashi-bot"
          git config --global user.email "bot@nanigashi.local"
          git add data/nanigashi.db
          if git diff --staged --quiet; then
            echo "DBに変更はありませんでした"
          else
            git commit -m "DB更新: 記事生成完了"
            git push
          fi
