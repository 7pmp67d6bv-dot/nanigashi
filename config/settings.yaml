# ============================================================
# nanigashi 自動執筆システム 設定ファイル
# ============================================================
# このファイルでブログの設定・記事の品質基準・SWELL吹き出しの
# テンプレートなどを管理します。
# APIキーなどの機密情報は .env ファイルに記載してください。
# ============================================================

# --- ブログ基本情報 ---
blog:
  name: "nanigashi"
  theme: "ガジェット・インテリア（Japandi/和モダン）・バッグ"
  target_audience: "30〜40代のライフスタイル意識の高い読者"
  # 記事の文体・トーン
  tone: "丁寧でわかりやすく、専門的すぎない。読者に寄り添う語り口。"
  # キーワードが薄い場合に補足するサブテーマ（カンマ区切り）
  sub_themes:
    - "ミニマリスト"
    - "Japandiスタイル"
    - "コスパ重視"
    - "大人のシンプル"

  # ============================================================
  # 文体サンプル（過去記事の一部を貼り付けてください）
  # Claudeがこの文体・語り口を参考にして記事を執筆します。
  # 3〜5段落程度が理想。空欄でもデフォルトのトーン設定が使われます。
  # ============================================================
  writing_style_sample: |
    インテリアからガジェットまで様々なアイテムを購入・使用しました。
    その中でも、実際に使って「これは買ってよかった！」と心から感じたお気に入りのモノたちをカテゴリごとに厳選してご紹介します。
    日々の暮らしを豊かにしてくれたアイテムばかりなので、自信を持っておすすめできます。

    大型センサーと単焦点レンズによる描写力はスマホでは味わえないレベルで、何気ない日常の一瞬も作品のように切り取れます。
    携帯性も抜群で肩肘張らずに持ち出せるので、いつの間にか「最高の相棒」と呼べる存在に。

    Alexa搭載で音声操作によるスマートホーム化が一気に進みました。
    照明や家電の操作、ニュースや天気の読み上げなど、「声でお願いする」だけで叶う快適さは一度体験すると手放せません。
    スピーカーとしての音質も向上しており、360度に広がるサウンドが部屋全体を包み込むようです。

    私はこのハブを導入したことで、「帰宅前に部屋を冷やしておく」「寝ながら照明を消す」が当たり前になり、思っていた以上にQOLが上がりました。

  # ブログ運営者のプロフィール（Claudeが一人称で書く際の参考にします）
  author_profile: |
    ゆるいミニマリスト。1K9畳に住むインテリア好き。
    好きなインテリアスタイルはジャパンディ。ガジェットには効率とコスパを求める。
    シンプルと機能性を両立するファッションが好き。海外旅行好き。
    ブログ名「nanigashi（某）」には「自分を卑下する際に用いる代名詞」という意味もあり、謙虚な心でインテリアとガジェットへの深い愛情を発信している。
    インテリアの洗練されたデザインから最新ガジェットの機能美まで、細部にこだわり心から楽しむスタイルを提案。
    暮らしの中で見つけた「何か」の美しさや便利さを探求し、読者の生活空間をより豊かにするお手伝いをしている。

# --- 記事品質設定 ---
article:
  # 本文の文字数（この範囲に収める）
  min_chars: 2500
  max_chars: 3500
  # SEOタイトルの生成候補数
  title_candidates: 3
  # メタディスクリプションの文字数
  meta_desc_min: 110
  meta_desc_max: 120
  # 記事中の吹き出し挿入数
  balloon_count: 3
  # 記事中のアフィリエイトリンク数（楽天+Amazon合計）
  affiliate_link_count: 3

# --- Claude API 設定 ---
claude:
  # 使用モデル（変更する場合はここを書き換える）
  model: "claude-opus-4-5"
  max_tokens: 8000
  # システムプロンプトに追加するカスタム指示（空欄でもOK）
  custom_instructions: ""

# --- SWELL吹き出し設定 ---
swell:
  # 吹き出しキャラクターの名前
  character_name: "なにがし"
  # キャラクター画像URL（WordPress メディアライブラリのURL を入れる。空欄でもOK）
  character_image_url: ""
  # 吹き出しの向き: "l"=左, "r"=右
  balloon_direction: "l"
  # 吹き出しブロックのHTMLテンプレート
  # {direction}, {image_url}, {name}, {text} が自動で置換されます
  balloon_template: |
    <!-- wp:swell/balloon {"direction":"{direction}","icon":{"id":"","url":"{image_url}","alt":""},"name":"{name}"} -->
    <div class="wp-block-swell-balloon is-direction-{direction}"><div class="balloon-body"><figure class="balloon-icon"><img src="{image_url}" alt="{name}" class="swell-balloon-icon"/><figcaption class="balloon-icon-name">{name}</figcaption></figure><div class="balloon-content"><p>{text}</p></div></div></div>
    <!-- /wp:swell/balloon -->

# --- GitHub Projects 設定 ---
github:
  # GitHubのユーザー名（リポジトリのオーナー）
  owner: "7pmp67d6bv-dot"
  # リポジトリ名
  repo: "nanigashi"
  # GitHub ProjectのProject Number（ProjectのURLの末尾の数字）
  # 例: https://github.com/users/xxx/projects/1 → 1
  project_number: 1
  # ProjectのStatusフィールド名（変更した場合はここも変える）
  status_field_name: "Status"
  # カンバンの列名（Project上の表示名と完全一致させること）
  columns:
    stock: "Stock"
    writing: "Writing"
    ready: "Ready"
    done: "Done"

# --- WordPress 設定 ---
wordpress:
  # 投稿ステータス（draft=下書き / publish=公開）
  post_status: "draft"
  # 投稿タイプ（通常は "post"）
  post_type: "post"
  # SEOプラグインのメタディスクリプション用フィールド名
  # Yoast SEO の場合: "_yoast_wpseo_metadesc"
  # SEO SIMPLE PACK の場合: "_seosp_description"
  # All in One SEO の場合: "_aioseop_description"
  seo_meta_field: "_yoast_wpseo_metadesc"
